<!--
=============================================================================
MODULO 12 - PRACTICA FINAL: PAGINA DE BUSQUEDA
=============================================================================

NIVEL: Avanzado
TEMA: Interfaz de busqueda con input, boton y resultados dinamicos

CONCEPTOS CLAVE DE ESTE ARCHIVO:
---------------------------------

1. FORMULARIO DE BUSQUEDA (sin <form>):
   Este buscador usa un <input> y un <button> FUERA de un formulario.
   Esto significa que el boton no envia datos al servidor (no hace submit).
   En su lugar, JavaScript captura el click del boton y hace una peticion AJAX.

   Ventajas: La pagina NO se recarga al buscar (experiencia tipo SPA).
   Desventajas: Si JavaScript esta deshabilitado, la busqueda no funciona.

2. ELEMENTOS CLAVE PARA JAVASCRIPT:
   - input#busqueda: Donde el usuario escribe la palabra a buscar.
     JavaScript lee su valor con: $('#busqueda').val() o
     document.getElementById('busqueda').value

   - button#btn-buscar: Dispara la busqueda al hacer click.
     JavaScript le asigna un evento click en buscar.js.

   - ul#miLista: Contenedor donde se mostraran los resultados.
     Inicialmente contiene "No hay coincidencias" como placeholder.
     JavaScript vaciara esta lista y la llenara con resultados.

3. CONTENEDOR DE RESULTADOS:
   Los resultados se muestran en una lista <ul>.
   El archivo buscar.js reemplazara su contenido con elementos <li>
   generados dinamicamente a partir de los datos de la API.

4. PATRON DE BUSQUEDA EN APLICACIONES WEB:
   Input del usuario -> Evento click -> Leer valor del input ->
   Peticion a API con la busqueda -> Parsear respuesta ->
   Limpiar resultados anteriores -> Mostrar nuevos resultados
=============================================================================
-->

    <main role="main" class="container">
      <div class="d-flex align-items-center p-3 my-3 text-white-50 bg-info rounded shadow-sm">
        <img class="mr-3" src="images/boton-de-reproduccion.png" alt="" width="48" height="48">
        <div class="lh-100">
          <h6 class="mb-0 text-white lh-100">Mi lista</h6>
          <small>Listas</small>
        </div>
      </div>
      <div class="my-3 p-3 bg-light">
      	<!--
        BUSCADOR:
        form-inline: Los elementos se colocan en linea (input + boton al lado).
        El input tiene:
        - type="text": Entrada de texto libre.
        - placeholder: Texto gris que aparece cuando el input esta vacio.
        - id="busqueda": Para que JavaScript pueda leer su valor.

        El boton tiene:
        - btn-outline-info: Boton con borde azul (estilo de Bootstrap).
        - id="btn-buscar": Para que JavaScript le asigne un evento click.
        -->
      	<div class="form-group form-inline my-2 my-lg-0">
      		<input class="form-control" type="text" value="" placeholder="Escribe palabra a buscar" id="busqueda"/>
      		<button class="btn btn-outline-info" id="btn-buscar">Buscar</button>
      	</div>
      </div>
      <!--
      LISTA DE RESULTADOS:
      #miLista es donde se inyectaran los resultados de la busqueda.
      Inicialmente tiene un solo <li> como placeholder.
      buscar.js vaciara esta lista ($.empty()) y la llenara con los resultados.
      -->
      <div class="my-3 p-3 bg-light rounded shadow-sm" id="content-lista">
        <ul id="miLista">
        	<li>No hay coincidencias</li>

        </ul>
      </div>
