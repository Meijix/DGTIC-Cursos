# =============================================================================
# EVENTO: SCHEDULE (Cron)
# =============================================================================
#
# Este workflow se ejecuta automaticamente segun un horario programado.
# Usa expresiones cron para definir cuando ejecutarse.
#
# CASOS DE USO TIPICOS:
# - Tests nocturnos completos (que tardan mucho para CI normal)
# - Limpiar artefactos o caches antiguos
# - Verificar que las dependencias siguen funcionando
# - Generar reportes periodicos
# - Monitorear un servicio o API
#
# COMO USARLO:
# 1. Copia a .github/workflows/evento_schedule.yml
# 2. El workflow se ejecutara segun el cron definido
# 3. IMPORTANTE: solo funciona en la rama por defecto (main)
#
# =============================================================================

name: Tareas Programadas

on:
  schedule:
    # --- EXPRESION CRON ---
    # Formato: minuto hora dia-mes mes dia-semana
    #
    #   ┌──────────── minuto (0-59)
    #   │  ┌───────── hora (0-23, en UTC)
    #   │  │  ┌────── dia del mes (1-31)
    #   │  │  │  ┌─── mes (1-12)
    #   │  │  │  │  ┌ dia de la semana (0-6, 0=domingo)
    #   │  │  │  │  │
    #   *  *  *  *  *
    #
    # Esta expresion: "todos los dias a las 6:00 UTC (medianoche Mexico)"
    - cron: '0 6 * * *'

    # Puedes tener multiples schedules:
    # - cron: '0 12 * * 1'    # Lunes a las 12:00 UTC
    # - cron: '0 0 1 * *'     # Primer dia de cada mes

  # Tambien permitir ejecucion manual para pruebas
  workflow_dispatch:

# IMPORTANTE sobre la zona horaria:
# GitHub Actions usa UTC. Para convertir a hora de Mexico (Ciudad de Mexico):
# - UTC-6 en horario estandar (octubre-marzo)
# - UTC-5 en horario de verano (abril-septiembre)
#
# Si quieres ejecutar a las 8:00 AM Mexico (horario estandar):
# cron: '0 14 * * *'   (14:00 UTC = 8:00 AM UTC-6)

jobs:
  # =========================================================================
  # JOB 1: VERIFICACION DIARIA DE DEPENDENCIAS
  # =========================================================================
  verificar-dependencias:
    name: "Verificar dependencias"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mostrar informacion del schedule
        run: |
          echo "=== Tarea Programada ==="
          echo "Fecha y hora (UTC): $(date -u)"
          echo "Evento: ${{ github.event_name }}"
          # Si fue activado por schedule, el cron expression esta disponible
          echo "Schedule: ${{ github.event.schedule }}"

      - name: Verificar dependencias desactualizadas
        run: |
          echo "Verificando si hay actualizaciones de dependencias..."
          # Para Node.js:
          # npm outdated || true
          # Para Python:
          # pip list --outdated || true
          echo "Simulacion: todas las dependencias estan al dia"

      - name: Verificar vulnerabilidades
        run: |
          echo "Buscando vulnerabilidades conocidas..."
          # Para Node.js:
          # npm audit
          # Para Python:
          # pip-audit
          # Para general:
          # trivy fs .
          echo "Simulacion: no se encontraron vulnerabilidades"

  # =========================================================================
  # JOB 2: TESTS COMPLETOS NOCTURNOS
  # =========================================================================
  tests-nocturnos:
    name: "Suite de tests completa"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tests completos
        run: |
          echo "Ejecutando suite de tests completa (incluye tests lentos)..."
          echo "Estos tests no se ejecutan en cada PR porque tardan mucho."
          echo ""
          echo "  Tests unitarios:      OK (simulado)"
          echo "  Tests de integracion: OK (simulado)"
          echo "  Tests end-to-end:     OK (simulado)"
          echo "  Tests de rendimiento: OK (simulado)"
          # Ejemplo real:
          # npm test -- --coverage --all
          # pytest --slow --integration --e2e

      - name: Generar reporte
        run: |
          echo "=== Reporte Nocturno ===" > reporte.txt
          echo "Fecha: $(date -u)" >> reporte.txt
          echo "Resultado: EXITOSO" >> reporte.txt
          echo "Tests ejecutados: 150" >> reporte.txt
          echo "Cobertura: 85%" >> reporte.txt

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: reporte-nocturno-${{ github.run_number }}
          path: reporte.txt
          retention-days: 30    # Guardar reportes por 30 dias

  # =========================================================================
  # JOB 3: LIMPIEZA
  # =========================================================================
  limpieza:
    name: "Limpieza periodica"
    runs-on: ubuntu-latest

    steps:
      - name: Limpiar caches antiguos
        run: |
          echo "Limpiando recursos antiguos..."
          # Ejemplo: limpiar caches de GitHub Actions
          # gh actions-cache list --limit 100 | \
          #   grep "older-than-7-days" | \
          #   xargs -I {} gh actions-cache delete {} --confirm
          echo "Limpieza completada"

# =============================================================================
# NOTAS SOBRE SCHEDULE:
#
# 1. SOLO RAMA POR DEFECTO:
#    Los workflows con schedule SOLO se ejecutan en la rama por defecto
#    (generalmente main o master). Si el workflow esta en otra rama,
#    el schedule no se activa.
#
# 2. NO ES EXACTO:
#    GitHub no garantiza ejecucion al minuto exacto. Puede haber retrasos
#    de varios minutos, especialmente en horas pico de GitHub.
#
# 3. MINIMO INTERVALO:
#    El minimo intervalo recomendado es cada 5 minutos (*/5 * * * *).
#    Intervalos mas cortos pueden ser ignorados.
#
# 4. INACTIVIDAD:
#    Si tu repositorio no tiene actividad (commits, issues, etc.) durante
#    60 dias, los schedules se desactivan automaticamente.
#    Para reactivarlos, haz cualquier actividad en el repo.
#
# 5. MULTIPLE SCHEDULES:
#    Si tienes multiples cron expressions, cada una genera una ejecucion
#    independiente. Puedes distinguirlas con:
#    if: github.event.schedule == '0 6 * * *'
#
# EXPRESIONES CRON UTILES:
#   '0 0 * * *'       -> Todos los dias a medianoche UTC
#   '0 6 * * 1-5'     -> Lunes a viernes a las 6 AM UTC
#   '0 12 * * 0'      -> Domingos a mediodia UTC
#   '0 0 1 * *'       -> Primer dia de cada mes
#   '*/30 * * * *'     -> Cada 30 minutos
#   '0 */6 * * *'      -> Cada 6 horas
# =============================================================================
