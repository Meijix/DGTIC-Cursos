# =============================================================================
# VARIABLES DE ENTORNO, SECRETOS Y CONTEXTOS
# =============================================================================
#
# Este workflow demuestra el uso de:
# - Variables de entorno en los 3 niveles (workflow, job, step)
# - Secretos (secrets)
# - Variables de repositorio (vars)
# - Contextos de GitHub (${{ ... }})
# - GITHUB_TOKEN
#
# COMO USARLO:
# 1. Configura los siguientes secretos en tu repositorio:
#    Settings > Secrets and variables > Actions > New repository secret
#    - MI_API_KEY: cualquier valor de prueba (ej: "test-key-12345")
#    - WEBHOOK_URL: cualquier URL (ej: "https://httpbin.org/post")
#
# 2. Configura las siguientes variables (NO secretos):
#    Settings > Secrets and variables > Actions > Variables tab
#    - APP_NAME: nombre de tu app (ej: "mi-aplicacion")
#    - LOG_LEVEL: nivel de log (ej: "info")
#
# 3. Copia a .github/workflows/variables_secretos.yml
# 4. Haz push y observa los resultados
#
# =============================================================================

name: Variables y Secretos

on:
  push:
    branches: [main]
  workflow_dispatch:

# ---------------------------------------------------------------------------
# NIVEL 1: Variables de entorno GLOBALES (todo el workflow)
# ---------------------------------------------------------------------------
# Estas variables estan disponibles en TODOS los jobs y steps.
# Es el lugar ideal para valores que se repiten en muchos lugares.
env:
  # Variables con valores fijos
  NODE_ENV: production
  TIMEZONE: America/Mexico_City
  APP_VERSION: "2.1.0"

  # Variable que referencia un secreto
  # NUNCA pongas el valor real aqui, siempre usa ${{ secrets.NOMBRE }}
  API_KEY: ${{ secrets.MI_API_KEY }}

  # Variable que referencia una variable del repositorio
  # Las vars se configuran en Settings > Secrets and variables > Variables
  APP_NAME: ${{ vars.APP_NAME }}

jobs:
  # =========================================================================
  # JOB 1: DEMOSTRAR NIVELES DE VARIABLES
  # =========================================================================
  niveles-variables:
    name: "Niveles de variables"
    runs-on: ubuntu-latest

    # NIVEL 2: Variables de entorno del JOB
    # Disponibles en todos los steps de este job.
    # Si hay conflicto con una global, la del job tiene prioridad.
    env:
      JOB_VAR: "solo-en-este-job"
      # Esto SOBREESCRIBE la variable global NODE_ENV para este job
      NODE_ENV: development

    steps:
      # NIVEL 3: Variables de entorno del STEP
      - name: Variables en los 3 niveles
        env:
          STEP_VAR: "solo-en-este-step"
          # Esto sobreescribe NODE_ENV solo para este step
          NODE_ENV: test
        run: |
          echo "=== Variables en los 3 niveles ==="
          echo ""
          echo "--- Nivel Workflow (global) ---"
          echo "TIMEZONE: $TIMEZONE"           # America/Mexico_City
          echo "APP_VERSION: $APP_VERSION"     # 2.1.0
          echo ""
          echo "--- Nivel Job ---"
          echo "JOB_VAR: $JOB_VAR"            # solo-en-este-job
          echo ""
          echo "--- Nivel Step ---"
          echo "STEP_VAR: $STEP_VAR"          # solo-en-este-step
          echo ""
          echo "--- Precedencia (step > job > workflow) ---"
          echo "NODE_ENV: $NODE_ENV"           # test (gana el step)

      - name: Verificar precedencia
        run: |
          echo "NODE_ENV: $NODE_ENV"           # development (gana el job,
                                               # porque STEP_VAR ya no existe)
          echo "STEP_VAR: $STEP_VAR"           # (vacio, no existe en este step)

  # =========================================================================
  # JOB 2: SECRETOS
  # =========================================================================
  secretos:
    name: "Uso de secretos"
    runs-on: ubuntu-latest

    steps:
      - name: Acceder a secretos
        env:
          # Los secretos se acceden con ${{ secrets.NOMBRE }}
          MI_TOKEN: ${{ secrets.MI_API_KEY }}
          WEBHOOK: ${{ secrets.WEBHOOK_URL }}
          # GITHUB_TOKEN es especial: GitHub lo genera automaticamente
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Secretos ==="
          echo ""
          # NOTA: Los secretos se enmascaran automaticamente en los logs.
          # Si intentas imprimirlos, aparecen como ***
          echo "MI_TOKEN: $MI_TOKEN"
          # Salida: MI_TOKEN: ***
          echo ""
          echo "GITHUB_TOKEN disponible: $([ -n "$GH_TOKEN" ] && echo 'Si' || echo 'No')"

      - name: Secreto inexistente
        env:
          # Si el secreto no existe, la variable queda vacia (no da error)
          NO_EXISTE: ${{ secrets.SECRETO_QUE_NO_EXISTE }}
        run: |
          if [ -z "$NO_EXISTE" ]; then
            echo "El secreto 'SECRETO_QUE_NO_EXISTE' no esta configurado"
            echo "Esto NO causa un error, simplemente es una cadena vacia"
          fi

  # =========================================================================
  # JOB 3: CONTEXTOS DE GITHUB
  # =========================================================================
  contextos:
    name: "Contextos de GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Contexto github
        run: |
          echo "=== Contexto: github ==="
          echo "Repositorio: ${{ github.repository }}"
          echo "Owner: ${{ github.repository_owner }}"
          echo "Ref: ${{ github.ref }}"
          echo "Nombre de ref: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "SHA corto: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
          echo "Run attempt: ${{ github.run_attempt }}"
          echo "Server URL: ${{ github.server_url }}"
          echo "API URL: ${{ github.api_url }}"

      - name: Contexto runner
        run: |
          echo "=== Contexto: runner ==="
          echo "OS: ${{ runner.os }}"
          echo "Arch: ${{ runner.arch }}"
          echo "Name: ${{ runner.name }}"
          echo "Temp dir: ${{ runner.temp }}"
          echo "Tool cache: ${{ runner.tool_cache }}"

      - name: Contexto job
        run: |
          echo "=== Contexto: job ==="
          echo "Status: ${{ job.status }}"

      # Ejemplo de usar contextos en condicionales
      - name: Solo en Linux
        if: runner.os == 'Linux'
        run: echo "Esto se ejecuta porque estamos en Linux"

      - name: Solo en push
        if: github.event_name == 'push'
        run: echo "Esto se ejecuta porque el evento fue un push"

  # =========================================================================
  # JOB 4: GITHUB_TOKEN EN ACCION
  # =========================================================================
  usar-github-token:
    name: "GITHUB_TOKEN"
    runs-on: ubuntu-latest
    # Definir permisos explicitos (buena practica de seguridad)
    permissions:
      contents: read
      issues: read

    steps:
      - name: Usar GITHUB_TOKEN con gh CLI
        env:
          # La CLI gh necesita el token en GH_TOKEN o GITHUB_TOKEN
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Usando GITHUB_TOKEN ==="
          echo ""
          # Listar issues abiertos
          echo "Issues abiertos:"
          gh issue list --repo ${{ github.repository }} --limit 5 || echo "No hay issues o no hay acceso"
          echo ""
          # Informacion del repositorio
          echo "Info del repositorio:"
          gh repo view ${{ github.repository }} --json name,description || echo "No se pudo obtener info"

  # =========================================================================
  # JOB 5: VARIABLES DINAMICAS Y OUTPUTS
  # =========================================================================
  variables-dinamicas:
    name: "Variables dinamicas"
    runs-on: ubuntu-latest

    # Declarar outputs del job para que otros jobs los usen
    outputs:
      fecha: ${{ steps.generar.outputs.fecha }}
      build-id: ${{ steps.generar.outputs.build_id }}

    steps:
      - name: Generar variables dinamicas
        id: generar
        run: |
          # Crear variables calculadas en tiempo de ejecucion

          # Fecha actual
          FECHA=$(date -u +"%Y-%m-%d")
          echo "fecha=$FECHA" >> $GITHUB_OUTPUT

          # ID de build unico
          BUILD_ID="${{ github.run_number }}-$(date +%s)"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

          echo "Fecha generada: $FECHA"
          echo "Build ID: $BUILD_ID"

      - name: Usar outputs del step anterior
        run: |
          echo "Fecha: ${{ steps.generar.outputs.fecha }}"
          echo "Build ID: ${{ steps.generar.outputs.build_id }}"

      # --- VARIABLES DE ENTORNO DINAMICAS ---
      # Para crear variables de entorno que persistan entre steps,
      # se escribe en $GITHUB_ENV
      - name: Crear variable de entorno persistente
        run: |
          # Esta variable estara disponible en los steps SIGUIENTES
          echo "MI_VARIABLE_DINAMICA=valor-calculado-$(date +%s)" >> $GITHUB_ENV

      - name: Usar variable de entorno persistente
        run: |
          echo "Variable dinamica: $MI_VARIABLE_DINAMICA"

  # =========================================================================
  # JOB 6: CONSUMIR OUTPUTS DE OTRO JOB
  # =========================================================================
  consumir-outputs:
    name: "Consumir outputs"
    runs-on: ubuntu-latest
    needs: variables-dinamicas

    steps:
      - name: Leer outputs del job anterior
        run: |
          echo "=== Outputs del job 'variables-dinamicas' ==="
          echo "Fecha: ${{ needs.variables-dinamicas.outputs.fecha }}"
          echo "Build ID: ${{ needs.variables-dinamicas.outputs.build-id }}"

# =============================================================================
# RESUMEN DE COMO ACCEDER A DATOS:
#
# | Tipo                  | Sintaxis                                    |
# |-----------------------|---------------------------------------------|
# | Variable de entorno   | $MI_VAR o ${{ env.MI_VAR }}                 |
# | Secreto               | ${{ secrets.MI_SECRETO }}                   |
# | Variable del repo     | ${{ vars.MI_VARIABLE }}                     |
# | Contexto GitHub       | ${{ github.actor }}                         |
# | Output de step        | ${{ steps.ID.outputs.NOMBRE }}              |
# | Output de job         | ${{ needs.JOB_ID.outputs.NOMBRE }}          |
# | Variable de matrix    | ${{ matrix.VARIABLE }}                      |
# | Input de dispatch     | ${{ inputs.NOMBRE }}                        |
# | GITHUB_TOKEN          | ${{ secrets.GITHUB_TOKEN }} o ${{ github.token }} |
#
# PARA CREAR DATOS DINAMICOS:
# | Que                   | Como                                        |
# |-----------------------|---------------------------------------------|
# | Output de step        | echo "key=value" >> $GITHUB_OUTPUT          |
# | Var de entorno        | echo "KEY=VALUE" >> $GITHUB_ENV             |
# | Resumen del workflow  | echo "texto" >> $GITHUB_STEP_SUMMARY        |
# | Path del sistema      | echo "/mi/ruta" >> $GITHUB_PATH             |
#
# ERRORES COMUNES:
# - Usar ${{ secrets.X }} en un if sin comillas (funciona, pero confunde)
# - Olvidar que los secretos no estan disponibles en PRs de forks
# - Intentar imprimir un secreto para "verificar" (aparece como ***)
# - Confundir secrets (cifrados) con vars (visibles)
# =============================================================================
