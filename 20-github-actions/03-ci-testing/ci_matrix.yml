# =============================================================================
# CI CON MATRICES MULTI-VERSION Y MULTI-OS
# =============================================================================
#
# Este workflow demuestra como usar matrices para probar tu proyecto en:
# - Multiples versiones de un lenguaje (Python 3.10/3.11/3.12, Node 18/20/22)
# - Multiples sistemas operativos (Ubuntu, Windows, macOS)
# - Combinaciones especificas con include/exclude
#
# CUANDO USAR MATRICES:
# - Librerias que deben funcionar en varias versiones (paquetes npm, PyPI)
# - Aplicaciones que deben correr en multiples OS
# - Cuando necesitas verificar compatibilidad
#
# COMO USARLO:
# 1. Copia a .github/workflows/ci_matrix.yml
# 2. Ajusta las versiones segun tu proyecto
# 3. Haz push y observa los multiples jobs generados
#
# =============================================================================

name: CI - Matriz Multi-Version

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # =========================================================================
  # JOB 1: PYTHON MULTI-VERSION + MULTI-OS
  # =========================================================================
  python-matrix:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      # Si un job falla, los demas SIGUEN ejecutandose.
      # Esto te permite ver exactamente cuales combinaciones fallan.
      fail-fast: false

      matrix:
        # 3 versiones de Python
        python-version: ['3.10', '3.11', '3.12']
        # 3 sistemas operativos
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Total: 3 x 3 = 9 combinaciones

        # Excluir combinaciones que no necesitamos
        # (ahorra minutos, especialmente macOS que cuesta 10x)
        exclude:
          # No probar Python 3.10 en macOS (version vieja + OS caro)
          - python-version: '3.10'
            os: macos-latest
          # No probar Python 3.10 en Windows
          - python-version: '3.10'
            os: windows-latest
        # Con exclude: 9 - 2 = 7 combinaciones

        # Agregar combinaciones con variables extra
        include:
          # Marcar Python 3.12 en Ubuntu como la combinacion "principal"
          - python-version: '3.12'
            os: ubuntu-latest
            principal: true
            # "principal" es una variable custom que usamos para decidir
            # que job sube los reportes de cobertura

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # pip install -r requirements.txt

      - name: Mostrar entorno
        run: |
          echo "=== Entorno ==="
          echo "Python: $(python --version)"
          echo "OS: ${{ matrix.os }}"
          echo "Runner: ${{ runner.os }}"
          echo "Arquitectura: ${{ runner.arch }}"
          python -c "import sys; print(f'Version info: {sys.version_info}')"
          python -c "import platform; print(f'Plataforma: {platform.platform()}')"

      - name: Ejecutar tests
        run: |
          # pytest tests/ -v --cov=src --cov-report=xml
          echo "pytest (simulado) en Python ${{ matrix.python-version }} / ${{ matrix.os }}"

      # Solo subir cobertura en la combinacion principal
      - name: Subir cobertura
        if: matrix.principal == true
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 7

  # =========================================================================
  # JOB 2: NODE.JS MULTI-VERSION
  # =========================================================================
  node-matrix:
    name: "Node ${{ matrix.node-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest, windows-latest]
        # Total: 3 x 2 = 6 combinaciones

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Mostrar entorno
        run: |
          echo "=== Entorno ==="
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "OS: ${{ matrix.os }}"

      - name: Instalar y testear
        run: |
          # npm ci
          # npm test
          echo "npm test (simulado) en Node ${{ matrix.node-version }} / ${{ matrix.os }}"

  # =========================================================================
  # JOB 3: PHP MULTI-VERSION CON SERVICIOS
  # =========================================================================
  php-matrix:
    name: "PHP ${{ matrix.php-version }} / DB: ${{ matrix.database }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3']
        database: [mysql, postgresql]
        # Total: 3 x 2 = 6 combinaciones

        # Incluir configuracion especifica por base de datos
        include:
          - database: mysql
            db-image: mysql:8.0
            db-port: 3306
            db-user: root
            db-password: password
            db-name: testing

          - database: postgresql
            db-image: postgres:16
            db-port: 5432
            db-user: postgres
            db-password: password
            db-name: testing

    # Los servicios se definen con las variables de la matrix
    services:
      database:
        image: ${{ matrix.db-image }}
        env:
          # Variables para MySQL
          MYSQL_ROOT_PASSWORD: ${{ matrix.db-password }}
          MYSQL_DATABASE: ${{ matrix.db-name }}
          # Variables para PostgreSQL
          POSTGRES_PASSWORD: ${{ matrix.db-password }}
          POSTGRES_DB: ${{ matrix.db-name }}
        ports:
          - ${{ matrix.db-port }}:${{ matrix.db-port }}
        options: >-
          --health-cmd="
            if [ '${{ matrix.database }}' = 'mysql' ]; then
              mysqladmin ping -h localhost;
            else
              pg_isready -h localhost;
            fi
          "
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql, pdo_pgsql, mbstring
          tools: composer

      - name: Mostrar entorno
        run: |
          echo "PHP: $(php --version | head -1)"
          echo "Base de datos: ${{ matrix.database }}"
          echo "Puerto: ${{ matrix.db-port }}"

      - name: Tests con base de datos
        run: |
          echo "Tests con PHP ${{ matrix.php-version }} y ${{ matrix.database }}"
          # vendor/bin/phpunit
        env:
          DB_CONNECTION: ${{ matrix.database }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.db-port }}
          DB_DATABASE: ${{ matrix.db-name }}
          DB_USERNAME: ${{ matrix.db-user }}
          DB_PASSWORD: ${{ matrix.db-password }}

  # =========================================================================
  # JOB FINAL: VERIFICAR QUE TODAS LAS MATRICES PASARON
  # =========================================================================
  verificar-matrices:
    name: "Verificar todas las matrices"
    runs-on: ubuntu-latest
    needs: [python-matrix, node-matrix, php-matrix]
    if: always()

    steps:
      - name: Verificar resultados
        run: |
          echo "=== Resultados de las matrices ==="
          echo "Python: ${{ needs.python-matrix.result }}"
          echo "Node.js: ${{ needs.node-matrix.result }}"
          echo "PHP: ${{ needs.php-matrix.result }}"

          # Si alguna matrix fallo, este job tambien falla.
          # Esto es util para branch protection rules: solo necesitas
          # requerir este job en lugar de todos los jobs individuales.
          if [ "${{ needs.python-matrix.result }}" == "failure" ] || \
             [ "${{ needs.node-matrix.result }}" == "failure" ] || \
             [ "${{ needs.php-matrix.result }}" == "failure" ]; then
            echo "Una o mas matrices fallaron"
            exit 1
          fi

          echo "Todas las matrices pasaron correctamente"

# =============================================================================
# PATRONES UTILES PARA MATRICES:
#
# 1. JOB GUARDIAN: El job "verificar-matrices" actua como guardian.
#    En branch protection rules, solo necesitas requerir este job
#    en lugar de los muchos jobs individuales de la matrix.
#
# 2. EXCLUDE PARA AHORRO: Excluir macOS cuando no es necesario
#    (cuesta 10x). Solo probar en macOS la version principal.
#
# 3. INCLUDE PARA VARIABLES EXTRA: Usa include para agregar
#    configuracion especifica por combinacion (como la DB).
#
# 4. FAIL-FAST FALSE: Casi siempre es mejor false en matrices
#    para ver TODAS las combinaciones que fallan, no solo la primera.
#
# 5. VERSION EN COMILLAS: Siempre pon las versiones como strings:
#    python-version: ['3.10']  NO  python-version: [3.10]
#    Porque 3.10 en YAML = 3.1 (el cero se pierde).
# =============================================================================
