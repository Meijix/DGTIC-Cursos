# =============================================================================
# REGLAS Y LIMITACIONES DE WORKFLOWS REUTILIZABLES:
#
# 1. LIMITE DE ANIDAMIENTO: Maximo 4 niveles de profundidad
#    (A llama a B, B llama a C, C llama a D -> OK)
#    (A -> B -> C -> D -> E -> FALLO)
#
# 2. LIMITE DE LLAMADAS: Un workflow puede llamar maximo 20 reutilizables
#
# 3. VARIABLES DE ENTORNO: No se heredan del llamador al reutilizable.
#    Debes pasarlas como inputs.
#
# 4. SECRETOS: No se heredan automaticamente. Usa:
#    secrets: inherit  (pasa todos)
#    O pasa secretos especificos como inputs.
#
# 5. CONCURRENCIA: Se puede definir en el llamador, en el reutilizable, o ambos.
#
# 6. TRIGGER: El reutilizable DEBE tener "on: workflow_call" como trigger.
#    Puede tener otros triggers adicionales (push, etc.) para testing.
#
# 7. REFERENCIA:
#    Mismo repo: uses: ./.github/workflows/reusable.yml
#    Otro repo:  uses: org/repo/.github/workflows/reusable.yml@ref
#    (ref puede ser: branch, tag, SHA)
# =============================================================================
