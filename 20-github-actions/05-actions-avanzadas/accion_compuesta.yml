# =============================================================================
# ACCION COMPUESTA (Composite Action)
# =============================================================================
#
# Este archivo demuestra DOS cosas:
# 1. Como CREAR una accion compuesta (action.yml)
# 2. Como USAR una accion compuesta en un workflow
#
# Las acciones compuestas empaquetan multiples steps en una sola accion
# reutilizable. Son la forma mas simple de crear acciones personalizadas.
#
# ESTRUCTURA DE ARCHIVOS:
#   .github/
#     actions/
#       setup-proyecto/           <-- Tu accion compuesta
#         action.yml              <-- Definicion de la accion
#     workflows/
#       accion_compuesta.yml      <-- Este workflow que la usa
#
# COMO USARLO:
# 1. Crea la carpeta .github/actions/setup-proyecto/
# 2. Crea action.yml dentro (ver seccion DEFINICION mas abajo)
# 3. Copia este workflow a .github/workflows/accion_compuesta.yml
# 4. Haz push y observa como se ejecuta
#
# =============================================================================

# =============================================================================
# PARTE 1: DEFINICION DE LA ACCION COMPUESTA
# =============================================================================
# Este bloque NO va en el workflow. Va en un archivo separado:
# .github/actions/setup-proyecto/action.yml
#
# Lo incluimos aqui como referencia educativa.
# ----------- INICIO de action.yml (copiar a su propio archivo) -----------
#
# name: 'Setup Proyecto'
# description: 'Configura el entorno del proyecto: Node.js, cache, dependencias'
# author: 'Tu Equipo'
#
# # --- INPUTS ---
# # Los inputs son parametros que el usuario pasa al usar la accion.
# inputs:
#   node-version:
#     description: 'Version de Node.js a instalar'
#     required: false
#     default: '20'
#   install-dependencies:
#     description: 'Si se deben instalar las dependencias (true/false)'
#     required: false
#     default: 'true'
#   working-directory:
#     description: 'Directorio de trabajo'
#     required: false
#     default: '.'
#
# # --- OUTPUTS ---
# # Los outputs son valores que la accion devuelve al workflow.
# outputs:
#   node-version-actual:
#     description: 'Version de Node.js realmente instalada'
#     value: ${{ steps.node-info.outputs.version }}
#   cache-hit:
#     description: 'Si se uso el cache'
#     value: ${{ steps.cache.outputs.cache-hit }}
#
# # --- RUNS ---
# # "using: composite" indica que es una accion compuesta.
# runs:
#   using: 'composite'
#   steps:
#     # NOTA: En acciones compuestas, "shell" es OBLIGATORIO en cada
#     # step de tipo "run". Esto es diferente de los workflows normales.
#
#     - name: Checkout (si no se hizo antes)
#       uses: actions/checkout@v4
#
#     - name: Instalar Node.js
#       uses: actions/setup-node@v4
#       with:
#         node-version: ${{ inputs.node-version }}
#
#     - name: Cache de dependencias
